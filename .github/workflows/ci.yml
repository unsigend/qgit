# qgit CI: build, tests, format, static analysis (LLVM)
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            make \
            libssl-dev \
            zlib1g-dev \
            bats \
            clang \
            clang-format \
            clang-tools

      - name: Check formatting
        run: |
          set -e
          for d in include src; do
            find "$d" \( -name "*.c" -o -name "*.h" \) -print0 | \
              xargs -0 clang-format --dry-run --Werror
          done

      - name: Static analysis
        run: |
          scan-build --status-bugs -o scan-build-out make clean all

      - name: Unit tests
        run: make unit

      - name: Integration tests
        run: make test
